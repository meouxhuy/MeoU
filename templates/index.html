#stars {

.wheel-and-hamster {
--dur: 1s;
position: relative;
width: 12em;
height: 12em;
font-size: 14px;
}

.wheel,
.hamster,
.hamster div,
.spoke {
position: absolute;
}

.wheel,
.spoke {
border-radius: 50%;
top: 0;
left: 0;
width: 100%;
height: 100%;
}

.wheel {
background: radial-gradient(100% 100% at center,hsla(0,0%,60%,0) 47.8%,hsl(0,0%,60%) 48%);
z-index: 2;
}

body.dark-mode .wheel {
background: radial-gradient(100% 100% at center,hsla(0,0%,40%,0) 47.8%,hsl(0,0%,40%) 48%);
}

.hamster {
animation: hamster var(--dur) ease-in-out infinite;
top: 50%;
left: calc(50% - 3.5em);
width: 7em;
height: 3.75em;
transform: rotate(4deg) translate(-0.8em,1.85em);
transform-origin: 50% 0;
z-index: 1;
}

.hamster__head {
animation: hamsterHead var(--dur) ease-in-out infinite;
background: hsl(30,90%,55%);
border-radius: 70% 30% 0 100% / 40% 25% 25% 60%;
box-shadow: 0 -0.25em 0 hsl(30,90%,80%) inset,
0.75em -1.55em 0 hsl(30,90%,90%) inset;
top: 0;
left: -2em;
width: 2.75em;
height: 2.5em;
transform-origin: 100% 50%;
}

.hamster__ear {
animation: hamsterEar var(--dur) ease-in-out infinite;
background: hsl(0,90%,85%);
border-radius: 50%;
box-shadow: -0.25em 0 hsl(30,90%,55%) inset;
top: -0.25em;
right: -0.25em;
width: 0.75em;
height: 0.75em;
transform-origin: 50% 75%;
}

.hamster__eye {
animation: hamsterEye var(--dur) linear infinite;
background-color: hsl(0,0%,0%);
border-radius: 50%;
top: 0.375em;
left: 1.25em;
width: 0.5em;
height: 0.5em;
}

.hamster__nose {
background: hsl(0,90%,75%);
border-radius: 35% 65% 85% 15% / 70% 50% 50% 30%;
top: 0.75em;
left: 0;
width: 0.2em;
height: 0.25em;
}

.hamster__body {
animation: hamsterBody var(--dur) ease-in-out infinite;
background: hsl(30,90%,90%);
border-radius: 50% 30% 50% 30% / 15% 60% 40% 40%;
box-shadow: 0.1em 0.75em 0 hsl(30,90%,55%) inset,
0.15em -0.5em 0 hsl(30,90%,80%) inset;
top: 0.25em;
left: 2em;
width: 4.5em;
height: 3em;
transform-origin: 17% 50%;
transform-style: preserve-3d;
}

.hamster__limb--fr,
.hamster__limb--fl {
clip-path: polygon(0 0,100% 0,70% 80%,60% 100%,0% 100%,40% 80%);
top: 2em;
left: 0.5em;
width: 1em;
height: 1.5em;
transform-origin: 50% 0;
}

.hamster__limb--fr {
animation: hamsterFRLimb var(--dur) linear infinite;
background: linear-gradient(hsl(30,90%,80%) 80%,hsl(0,90%,75%) 80%);
transform: rotate(15deg) translateZ(-1px);
}

.hamster__limb--fl {
animation: hamsterFLLimb var(--dur) linear infinite;
background: linear-gradient(hsl(30,90%,90%) 80%,hsl(0,90%,85%) 80%);
transform: rotate(15deg);
}

.hamster__limb--br,
.hamster__limb--bl {
border-radius: 0.75em 0.75em 0 0;
clip-path: polygon(0 0,100% 0,100% 30%,70% 90%,70% 100%,30% 100%,40% 90%,0% 30%);
top: 1em;
left: 2.8em;
width: 1.5em;
height: 2.5em;
transform-origin: 50% 30%;
}

.hamster__limb--br {
animation: hamsterBRLimb var(--dur) linear infinite;
background: linear-gradient(hsl(30,90%,80%) 90%,hsl(0,90%,75%) 90%);
transform: rotate(-25deg) translateZ(-1px);
}

.hamster__limb--bl {
animation: hamsterBLLimb var(--dur) linear infinite;
background: linear-gradient(hsl(30,90%,90%) 90%,hsl(0,90%,85%) 90%);
transform: rotate(-25deg);
}

.hamster__tail {
animation: hamsterTail var(--dur) linear infinite;
background: hsl(0,90%,85%);
border-radius: 0.25em 50% 50% 0.25em;
box-shadow: 0 -0.2em 0 hsl(0,90%,75%) inset;
top: 1.5em;
right: -0.5em;
width: 1em;
height: 0.5em;
transform: rotate(30deg) translateZ(-1px);
transform-origin: 0.25em 0.25em;
}

.spoke {
animation: spoke var(--dur) linear infinite;
background: radial-gradient(100% 100% at center,hsl(0,0%,60%) 4.8%,hsla(0,0%,60%,0) 5%),
linear-gradient(hsla(0,0%,55%,0) 46.9%,hsl(0,0%,65%) 47% 52.9%,hsla(0,0%,65%,0) 53%) 50% 50% / 99% 99% no-repeat;
}

body.dark-mode .spoke {
background: radial-gradient(100% 100% at center,hsl(0,0%,40%) 4.8%,hsla(0,0%,40%,0) 5%),
linear-gradient(hsla(0,0%,35%,0) 46.9%,hsl(0,0%,45%) 47% 52.9%,hsla(0,0%,45%,0) 53%) 50% 50% / 99% 99% no-repeat;
}

@keyframes hamster {
from, to {
transform: rotate(4deg) translate(-0.8em,1.85em);
}

50% {
transform: rotate(0) translate(-0.8em,1.85em);
}
}

@keyframes hamsterHead {
from, 25%, 50%, 75%, to {
transform: rotate(0);
}

12.5%, 37.5%, 62.5%, 87.5% {
transform: rotate(8deg);
}
}

@keyframes hamsterEye {
from, 90%, to {
transform: scaleY(1);
}

95% {
transform: scaleY(0);
}
}

@keyframes hamsterEar {
from, 25%, 50%, 75%, to {
transform: rotate(0);
}

12.5%, 37.5%, 62.5%, 87.5% {
transform: rotate(12deg);
}
}

@keyframes hamsterBody {
from, 25%, 50%, 75%, to {
transform: rotate(0);
}

12.5%, 37.5%, 62.5%, 87.5% {
transform: rotate(-2deg);
}
}

@keyframes hamsterFRLimb {
from, 25%, 50%, 75%, to {
transform: rotate(50deg) translateZ(-1px);
}

12.5%, 37.5%, 62.5%, 87.5% {
transform: rotate(-30deg) translateZ(-1px);
}
}

@keyframes hamsterFLLimb {
from, 25%, 50%, 75%, to {
transform: rotate(-30deg);
}

12.5%, 37.5%, 62.5%, 87.5% {
transform: rotate(50deg);
}
}

@keyframes hamsterBRLimb {
from, 25%, 50%, 75%, to {
transform: rotate(-60deg) translateZ(-1px);
}

12.5%, 37.5%, 62.5%, 87.5% {
transform: rotate(20deg) translateZ(-1px);
}
}

@keyframes hamsterBLLimb {
from, 25%, 50%, 75%, to {
transform: rotate(20deg);
}

12.5%, 37.5%, 62.5%, 87.5% {
transform: rotate(-60deg);
}
}

@keyframes hamsterTail {
from, 25%, 50%, 75%, to {
transform: rotate(30deg) translateZ(-1px);
}

12.5%, 37.5%, 62.5%, 87.5% {
transform: rotate(10deg) translateZ(-1px);
}
}

@keyframes spoke {
from {
transform: rotate(0);
}

to {
transform: rotate(-1turn);
}
}
</style>
</head>

function showMeoUAlert(m){const b=document.getElementById('meouAlert');document.getElementById('alertMsg').innerText=m;b.classList.remove('hidden');setTimeout(()=>b.classList.add('hidden'),3500)}
function exportToExcelCore(arr,f){
const rows=[["Ngày Đăng","Channel Name","Link YouTube","Loại Video","Có Gắn Giỏ Hàng?","Tổng SP Shopee","Tổng SP Lazada","Link SP","SP Thuộc","TỔNG SP Khác"]];
const st={alignment:{vertical:'center',horizontal:'center'},border:{top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}};
arr.forEach(d=>{d.results.forEach(v=>{
let tl=v.shopping_links.filter(i=>i.platform==='Shopee'||i.platform==='Lazada');
if(tl.length>0){tl.forEach(l=>{rows.push([v.display_date,v.channel_name,v.url,v.type,v.has_shopping?"Có":"Không",v.shopee_count,v.lazada_count,l.clean_url,l.platform,v.other_count])})}
else if(v.other_count>0){rows.push([v.display_date,v.channel_name,v.url,v.type,"Có",v.shopee_count,v.lazada_count,"","Sàn Khác",v.other_count])}
else rows.push([v.display_date,v.channel_name,v.url,v.type,"Không",v.shopee_count,v.lazada_count,"","",v.other_count])})});
const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:15},{wch:25},{wch:35},{wch:12},{wch:18},{wch:18},{wch:18},{wch:60},{wch:12},{wch:18}];
for(let c in ws){if(c[0]==='!')continue;let r=XLSX.utils.decode_cell(c);let v=ws[c].v;let s=JSON.parse(JSON.stringify(st));
if(r.r===0){s.fill={fgColor:{rgb:"002060"}};s.font={bold:true,color:{rgb:"FFFFFF"}}}
else{if(r.c===2||r.c===7)s.alignment.horizontal='left';if(r.c===4)s.font={bold:true,color:{rgb:v==="Có"?"00B050":"FF0000"}};
if(r.c===8){if(v==="Shopee")s.font={bold:true,color:{rgb:"FF8C00"}};else if(v==="Lazada")s.font={bold:true,color:{rgb:"FF1493"}}}}ws[c].s=s}
const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"MeoU");XLSX.writeFile(wb,f)}

c.classList.remove('hidden');b.innerText=temporaryStorage.length;l.innerHTML='';
temporaryStorage.forEach((item,i)=>{
let n=item.channel_name.length>20?item.channel_name.substring(0,18)+'...':item.channel_name;
l.innerHTML+=`<li class="flex justify-between items-center p-2 hover:bg-indigo-50 rounded-xl mb-1 border border-transparent hover:border-indigo-100 transition-colors"><span class="text-sm font-bold text-slate-600 truncate mr-2">${n}</span><div class="flex gap-1">
<button onclick="downloadSingleFile(${i})" class="p-1.5 bg-blue-50 text-blue-500 rounded-lg hover:bg-blue-500 hover:text-white transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></button>
<button onclick="deleteSingleFile(${i})" class="p-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
</div></li>`})}
window.downloadSingleFile=(i)=>{const d=temporaryStorage[i];exportToExcelCore([d],`MeoU_${d.channel_name}.xlsx`)};
window.deleteSingleFile=(i)=>{temporaryStorage.splice(i,1);updateArchiveUI();if(temporaryStorage.length===0&&currentData.results.length>0){document.getElementById('saveTempBtn').classList.remove('hidden');isCurrentSaved=false}};
document.getElementById('saveTempBtn').addEventListener('click',()=>{
if(isCurrentSaved)return;temporaryStorage.push(JSON.parse(JSON.stringify(currentData)));isCurrentSaved=true;
document.getElementById('saveTempBtn').classList.add('hidden');updateArchiveUI();showMeoUAlert('Đã lưu vào bộ nhớ!')});

document.addEventListener('click',(e)=>{if(!document.getElementById('archiveContainer').contains(e.target))document.getElementById('archiveDropdown').classList.add('hidden')});
document.getElementById('exportBtn').addEventListener('click',()=>exportToExcelCore([currentData],`MeoU_${currentData.channel_name}.xlsx`));

// Mode Toggle Functionality
let isBatchMode=false;
const modeToggle=document.getElementById('modeToggle');
const modeText=document.getElementById('modeText');
const linksInput=document.getElementById('linksInput');

// Auto-resize textarea
function autoResizeTextarea(){
linksInput.style.height='auto';
linksInput.style.height=linksInput.scrollHeight+'px';
}

linksInput.addEventListener('input',autoResizeTextarea);

// Prevent Enter key in single mode
linksInput.addEventListener('keydown',(e)=>{
if(!isBatchMode&&e.key==='Enter'){
e.preventDefault();
return false;
}
});

function createStarBurst(x,y){
const starCount=8;
for(let i=0;i<starCount;i++){
const star=document.createElement('div');
star.className='star-particle';
const angle=(360/starCount)*i;
const distance=60;
const endX=x+Math.cos(angle*Math.PI/180)*distance;
const endY=y+Math.sin(angle*Math.PI/180)*distance;
star.style.left=x+'px';
star.style.top=y+'px';
star.style.setProperty('--end-x',endX+'px');
star.style.setProperty('--end-y',endY+'px');
document.body.appendChild(star);
setTimeout(()=>star.remove(),600);
}
}

modeToggle.addEventListener('click',(e)=>{
const overlay=document.getElementById('modeSwitchOverlay');
overlay.classList.add('active');
setTimeout(()=>{
const rect=modeToggle.getBoundingClientRect();
const x=rect.left+rect.width/2;
const y=rect.top+rect.height/2;
createStarBurst(x,y);
isBatchMode=!isBatchMode;
modeToggle.classList.toggle('batch-mode');
	if(isBatchMode){
		modeText.textContent='SCAN NHIỀU KÊNH';
		linksInput.placeholder='Dán link kênh vào đây (tối đa 100 kênh, mỗi kênh 1 dòng)...';
	}else{
modeText.textContent='SCAN TỪNG KÊNH';
linksInput.placeholder='Dán link kênh vào đây...';
linksInput.value=linksInput.value.split('\n')[0]||'';
}
autoResizeTextarea();
setTimeout(()=>{
overlay.classList.remove('active');
},2000);
},100);
});

// Initialize textarea height
autoResizeTextarea();

// Batch loading progress
function updateBatchProgress(current, total){
const container=document.getElementById('batchLoadingContainer');
const percentEl=document.getElementById('batchLoadingPercent');
const textEl=document.getElementById('batchLoadingText');
if(total > 1){
const percent = Math.round((current / total) * 100);
container.classList.remove('hidden');
percentEl.textContent=percent+'%';
textEl.textContent=`Đang scan kênh ${current}/${total}`;
}else{
container.classList.add('hidden');
}
}

// Update scan button validation
const originalScanHandler=document.getElementById('scanBtn').onclick;
document.getElementById('scanBtn').onclick=null;
document.getElementById('scanBtn').addEventListener('click',async()=>{
const u=document.getElementById('linksInput').value.split('\n').map(v=>v.trim()).filter(v=>v!=='');
const s=document.getElementById('startDate').value;
const e=document.getElementById('endDate').value;
if(!s||!e)return showMeoUAlert('Vui lòng chọn ngày!');
if(u.length===0)return showMeoUAlert('Chưa dán link!');
	if(isBatchMode&&u.length>100){
		return showMeoUAlert(`Cho Mèo thở với, scan 100 kênh một lần thôi. Hiện tại là ${u.length} kênh`);
	}
if(!isBatchMode&&u.length>1){
return showMeoUAlert('Chế độ Scan Từng Kênh chỉ cho phép 1 link!');
}
const lD=document.getElementById('loading');const lT=document.getElementById('loadingText');lD.classList.remove('hidden');let mi=0;lT.innerText=loadingMessages[mi];
if(loadingInterval)clearInterval(loadingInterval);
loadingInterval=setInterval(()=>{mi=(mi+1)%loadingMessages.length;lT.innerText=loadingMessages[mi]},3000);
document.getElementById('resultTableBody').innerHTML='';document.getElementById('exportBtn').classList.add('hidden');document.getElementById('saveTempBtn').classList.add('hidden');isCurrentSaved=false;

// Hiển thị tiến trình nếu scan nhiều kênh
if(u.length > 1){
updateBatchProgress(0, u.length);
}

try{
const res=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({urls:u,startDate:s,endDate:e})});
currentData=await res.json();const tb=document.getElementById('resultTableBody');
if(currentData.results&&currentData.results.length>0){
document.getElementById('exportBtn').classList.remove('hidden');
document.getElementById('saveTempBtn').classList.remove('hidden');
}
if(currentData.results&&currentData.results.length>0){
currentData.results.forEach(r=>{
const tr=document.createElement('tr');tr.className="border-b border-indigo-50 hover:bg-indigo-50/20 transition-all";
let tc=r.type==='Short'?'text-pink-500':(r.type==='Stream'?'text-purple-600':'text-blue-500');
let sh=r.has_shopping?'<span class="text-emerald-500 font-extrabold text-lg">Có</span>':'<span class="text-slate-300">Không</span>';
let lh='';if(r.has_shopping){
let tl=r.shopping_links.filter(i=>i.platform==='Shopee'||i.platform==='Lazada');
if(tl.length>0){
const items=tl.map(i=>{let bc=i.platform==='Shopee'?'text-orange-500 bg-orange-50 border-orange-200':'text-blue-600 bg-blue-50 border-blue-200';
return `<li class="mb-2 text-[13px] border-b border-indigo-50 pb-2 flex items-center gap-2"><span class="font-extrabold text-[10px] uppercase px-2 py-1 rounded border ${bc}">${i.platform}</span><a href="${i.clean_url}" target="_blank" class="text-indigo-600 hover:text-indigo-800 truncate block w-full">${i.clean_url}</a></li>`}).join('');
lh=`<div class="px-6 py-2"><button class="toggle-btn w-full bg-indigo-50 text-indigo-600 font-extrabold py-3 px-4 rounded-2xl border border-indigo-100 text-xs shadow-sm">Giỏ hàng: ${tl.length} SP ▼</button><ul class="link-list hidden mt-3 p-5 bg-white rounded-2xl border border-indigo-100 text-left custom-scrollbar overflow-y-auto max-h-48 shadow-xl">${items}</ul></div>`
}else lh=`<span class="text-slate-400 text-sm font-medium">${r.other_count} Sản phẩm khác</span>`}else lh='<span class="text-slate-300">Trống</span>';
tr.innerHTML=`<td class="text-center text-sm text-slate-500 border-r border-indigo-50">${r.display_date}</td><td class="text-sm px-8 truncate border-r border-indigo-50 text-slate-400 font-medium"><a href="${r.url}" target="_blank">${r.url}</a></td><td class="text-center border-r border-indigo-50 text-xs uppercase font-black ${tc}">${r.type}</td><td class="text-center text-sm border-r border-indigo-50">${sh}</td><td class="text-center w-full">${lh}</td>`;
tb.appendChild(tr);const b=tr.querySelector('.toggle-btn');if(b)b.onclick=()=>b.nextElementSibling.classList.toggle('hidden')})}else showMeoUAlert('Không tìm thấy video!')}catch(err){showMeoUAlert('Lỗi kết nối!')}finally{clearInterval(loadingInterval);lD.classList.add('hidden');updateBatchProgress(0,0)}});

// Theme Toggle Functionality
const themeToggle=document.getElementById('themeToggleTop');
const sunIcon=document.getElementById('sunIconTop');
